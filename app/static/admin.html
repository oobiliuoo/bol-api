<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bol-api // 控制面板</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/bol-icon.png">
    <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
    <div class="scanline-overlay"></div>
    <header class="header">
        <div class="logo">
            <img class="logo-icon" src="/static/bol-icon.png" alt="B">
            <div class="logo-text">bol<span>-api</span></div>
        </div>
        <div class="header-actions">
            <div class="header-status">
                <div class="status-dot"></div>
                <span>System Online</span>
            </div>
            <button class="btn btn-logout" onclick="showSettingsModal()">设置</button>
            <button class="btn btn-logout" onclick="logout()">退出登录</button>
        </div>
    </header>

    <main class="main">
        <h1 class="page-title">控制面板</h1>

        <!-- Tab Navigation -->
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('overview')">概览</button>
            <button class="tab-btn" onclick="switchTab('logs')">用量日志</button>
            <button class="tab-btn" onclick="switchTab('keys')">API 密钥</button>
            <button class="tab-btn" onclick="switchTab('channels')">渠道管理</button>
            <button class="tab-btn" onclick="switchTab('prices')">模型价格</button>
        </div>

        <!-- Overview Tab -->
        <div class="tab-content active" id="tab-overview">
            <!-- Stats -->
            <div class="stats-grid" id="stats"></div>

            <!-- Model Usage Section -->
            <div class="section" id="model-stats-section">
                <div class="section-header">
                    <div>
                        <span class="section-title">模型用量统计</span>
                        <span class="section-title-code" id="model-stats-period">7天</span>
                    </div>
                    <div class="period-tabs-inline">
                        <button class="period-tab-inline active" onclick="loadModelStats(5)">5时</button>
                        <button class="period-tab-inline" onclick="loadModelStats(24)">日</button>
                        <button class="period-tab-inline" onclick="loadModelStats(168)">周</button>
                        <button class="period-tab-inline" onclick="loadModelStats(720)">月</button>
                    </div>
                </div>
                <div id="model-stats-container"></div>
                <!-- 请求趋势图 -->
                <div class="trend-chart-section">
                    <div class="trend-header">
                        <span class="trend-title">请求趋势</span>
                        <div class="trend-metrics" id="trend-metrics">
                            <button class="trend-metric-btn active" data-metric="requests" onclick="switchTrendMetric('requests')">请求数</button>
                            <button class="trend-metric-btn" data-metric="tokens" onclick="switchTrendMetric('tokens')">Token 数</button>
                            <button class="trend-metric-btn" data-metric="cost" onclick="switchTrendMetric('cost')">费 用</button>
                        </div>
                    </div>
                    <div class="trend-canvas-wrapper">
                        <canvas id="trend-canvas"></canvas>
                    </div>
                    <div class="trend-legend" id="trend-legend"></div>
                </div>
            </div>
        </div>

        <!-- Logs Tab -->
        <div class="tab-content" id="tab-logs">
            <!-- Logs Summary Stats -->
            <div class="logs-summary-stats" id="logs-summary"></div>

            <div class="section">
                <div class="section-header">
                    <div>
                        <span class="section-title">用量日志</span>
                        <span class="section-title-code">/stats/logs</span>
                    </div>
                    <div class="logs-controls">
                        <select id="logs-days" onchange="loadLogs()">
                            <option value="1">1天</option>
                            <option value="7" selected>7天</option>
                            <option value="30">30天</option>
                        </select>
                        <select id="logs-model" onchange="loadLogs()">
                            <option value="">全部模型</option>
                        </select>
                        <select id="logs-status" onchange="loadLogs()">
                            <option value="">全部状态</option>
                            <option value="200">成功</option>
                            <option value="499">取消</option>
                            <option value="error">失败</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>模型</th>
                                <th>输入</th>
                                <th>输出</th>
                                <th>费用</th>
                                <th>延迟</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination" id="logs-pagination"></div>
            </div>
        </div>

        <!-- Keys Tab -->
        <div class="tab-content" id="tab-keys">
            <div class="section">
                <div class="section-header">
                    <div>
                        <span class="section-title">API 密钥</span>
                        <span class="section-title-code">/admin/keys</span>
                    </div>
                    <button class="btn btn-primary" onclick="showKeyModal()">
                        <span>+ 新建密钥</span>
                    </button>
                </div>
                <div class="table-container">
                    <table id="keys-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>密钥</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Channels Tab -->
        <div class="tab-content" id="tab-channels">
            <div class="section">
                <div class="section-header">
                    <div>
                        <span class="section-title">渠道管理</span>
                        <span class="section-title-code">/admin/channels</span>
                    </div>
                    <button class="btn btn-primary" onclick="showChannelModal()">
                        <span>+ 添加渠道</span>
                    </button>
                </div>
                <div class="table-container">
                    <table id="channels-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>协议</th>
                                <th>模型</th>
                                <th>状态</th>
                                <th>延迟</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Prices Tab -->
        <div class="tab-content" id="tab-prices">
            <div class="section">
                <div class="section-header">
                    <div>
                        <span class="section-title">模型价格</span>
                        <span class="section-title-code">$/M (每百万token)</span>
                    </div>
                    <button class="btn btn-primary" onclick="showPriceModal()">
                        <span>+ 添加价格</span>
                    </button>
                </div>
                <div class="table-container">
                    <table id="prices-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>模型名称</th>
                                <th>输入价格</th>
                                <th>输出价格</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <div class="confirm-title" id="confirm-title">确认操作</div>
            <div class="confirm-msg" id="confirm-msg">确定执行此操作？</div>
            <div class="confirm-actions">
                <button class="btn" onclick="confirmCancel()">取消</button>
                <button class="btn btn-danger" id="confirm-btn" onclick="confirmOk()">确定</button>
            </div>
        </div>
    </div>

    <!-- Key Modal -->
    <div class="modal-overlay" id="key-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">创建 API 密钥</span>
                <div class="modal-close" onclick="closeKeyModal()">✕</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>密钥名称（可选）</label>
                    <input type="text" id="key-name" placeholder="例如：生产环境应用">
                </div>
                <div id="key-result" style="display:none;">
                    <div class="form-group">
                        <label>新 API 密钥（请保存，仅显示一次）</label>
                        <div class="key-display">
                            <span id="key-value"></span>
                            <button class="btn key-copy-btn" onclick="copyKey()">复制</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeKeyModal()">取消</button>
                <button class="btn btn-primary" id="key-create-btn" onclick="createKey()">创建</button>
            </div>
        </div>
    </div>

    <!-- Channel Modal -->
    <div class="modal-overlay" id="channel-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">添加渠道</span>
                <div class="modal-close" onclick="closeChannelModal()">✕</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>渠道名称</label>
                    <input type="text" id="channel-name" placeholder="例如：OpenAI 生产环境">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>提供商类型</label>
                        <select id="channel-type" onchange="onChannelTypeChange()">
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>
                    <div class="form-group" id="protocol-group">
                        <label>API 协议</label>
                        <select id="channel-protocol">
                            <option value="openai">OpenAI 格式</option>
                            <option value="anthropic">Anthropic 格式</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>优先级</label>
                        <input type="number" id="channel-priority" value="1" min="1" max="100">
                    </div>
                </div>
                <div class="form-group">
                    <label>基础 URL</label>
                    <input type="text" id="channel-url" placeholder="https://api.openai.com">
                </div>
                <div class="form-group">
                    <label>API 密钥</label>
                    <div style="display: flex; gap: 8px; align-items: stretch;">
                        <input type="text" id="channel-apikey" placeholder="sk-..." style="flex: 1;">
                        <span id="key-status" style="display: none; padding: 0 10px; background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 6px; color: var(--success); font-size: 12px; font-weight: 500; align-self: center;">✓ 已设置</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>模型（逗号分隔，留空表示全部）</label>
                    <div style="display: flex; gap: 8px; align-items: stretch;">
                        <input type="text" id="channel-models" placeholder="gpt-4, gpt-3.5-turbo" style="flex: 1;">
                        <button class="btn" id="fetch-models-btn" onclick="fetchModels()" style="white-space: nowrap;">
                            <span>↻ 拉取</span>
                        </button>
                    </div>
                    <div id="fetch-models-status" style="margin-top: 8px; font-size: 12px; color: var(--text-muted); display: none;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeChannelModal()">取消</button>
                <button class="btn btn-primary" onclick="saveChannel()">保存</button>
            </div>
        </div>
    </div>

    <!-- Price Modal -->
    <div class="modal-overlay" id="price-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="price-modal-title">添加模型价格</span>
                <div class="modal-close" onclick="closePriceModal()">✕</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>模型名称</label>
                    <input type="text" id="price-model" placeholder="例如：gpt-4-turbo">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>输入价格 ($/M)</label>
                        <input type="number" id="price-input" value="0" min="0" step="0.01" placeholder="输入token价格">
                    </div>
                    <div class="form-group">
                        <label>输出价格 ($/M)</label>
                        <input type="number" id="price-output" value="0" min="0" step="0.01" placeholder="输出token价格">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closePriceModal()">取消</button>
                <button class="btn btn-primary" onclick="savePrice()">保存</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">系统设置</span>
                <div class="modal-close" onclick="closeSettingsModal()">✕</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>上游请求超时（秒）</label>
                    <input type="number" id="setting-timeout" value="300" min="30" max="3600" step="30" placeholder="30-3600">
                    <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
                        超出此时间未收到响应视为超时，建议 120-600 秒
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeSettingsModal()">取消</button>
                <button class="btn btn-primary" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
